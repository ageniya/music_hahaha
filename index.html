<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💒 婚礼音乐库 - 歌单制作</title>
    <link rel="stylesheet" href="css/style.css?v=20260723">
</head>
<body>
    <!-- 登录/注册页（独立整页） -->
    <div class="login-page" id="loginPage">
        <!-- 登录面板 -->
        <div class="login-card" id="loginPanel">
            <div class="login-icon">💒</div>
            <h2 class="login-title">婚礼音乐库</h2>
            <p class="login-subtitle">请登录后使用</p>
            <div class="login-field">
                <input type="text" id="loginName" placeholder="用户名" autocomplete="off">
            </div>
            <div class="login-field">
                <input type="password" id="loginPassword" placeholder="密码">
            </div>
            <div class="login-error" id="loginError"></div>
            <button class="btn btn-primary btn-login" id="btnLogin">登 录</button>
            <p class="login-switch">还没有账号？<a href="#" id="btnGoRegister">注册一个</a></p>
        </div>

        <!-- 注册面板 -->
        <div class="login-card" id="registerPanel" style="display:none;">
            <div class="login-icon">✨</div>
            <h2 class="login-title">创建账号</h2>
            <p class="login-subtitle">设置用户名和密码即可</p>
            <div class="login-field">
                <input type="text" id="regName" placeholder="用户名（至少2个字符）" autocomplete="off">
            </div>
            <div class="login-field">
                <input type="password" id="regPassword" placeholder="密码（至少3位）">
            </div>
            <div class="login-field">
                <input type="password" id="regPassword2" placeholder="确认密码">
            </div>
            <div class="login-error" id="regError"></div>
            <button class="btn btn-primary btn-login" id="btnRegister">注 册</button>
            <p class="login-switch">已有账号？<a href="#" id="btnGoLogin">返回登录</a></p>
        </div>
    </div>

    <!-- 主应用（登录后显示） -->
    <div id="appMain" style="display:none;">
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-left">
            <h1 class="logo">💒 婚礼音乐库</h1>
            <span class="subtitle">BGM 管理 & 歌单制作</span>
        </div>
        <div class="header-right">
            <span class="user-badge" id="userBadge">👤 <span id="headerUsername">-</span></span>
            <button class="btn btn-outline btn-small-logout" id="btnLogout" title="退出登录">🚪 退出</button>
            <button class="btn btn-primary" id="btnUpload" title="上传 MP3 文件">
                📥 上传 MP3
            </button>
            <button class="btn btn-outline" id="btnExportZip" title="导出歌单为 ZIP 压缩包">
                📦 导出 ZIP
            </button>
        </div>
        <!-- 隐藏的文件上传 input -->
        <input type="file" id="fileUploadMp3" accept=".mp3" multiple style="display:none">
    </header>

    <!-- 主体布局 -->
    <div class="main-container">
        <!-- 左侧：音乐库 -->
        <aside class="panel panel-library" id="panelLibrary">
            <div class="panel-header">
                <h2>📚 音乐库</h2>
                <span class="song-count" id="libraryCount">0 首</span>
            </div>

            <!-- 搜索与筛选 -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索歌曲、歌手、专辑...">
            </div>
            <div class="filter-row">
                <select id="filterGenre">
                    <option value="">全部风格</option>
                </select>
                <select id="filterScene">
                    <option value="">全部环节</option>
                </select>
                <select id="filterArtist">
                    <option value="">全部歌手</option>
                </select>
            </div>

            <!-- 歌曲列表 -->
            <div class="song-list" id="libraryList">
                <div class="empty-state">
                    <div class="empty-icon">🎶</div>
                    <p>还没有歌曲</p>
                    <p class="empty-hint">点击「上传 MP3」或拖拽 MP3 文件到这里</p>
                </div>
            </div>
        </aside>

        <!-- 中间分隔 -->
        <div class="divider"></div>

        <!-- 右侧：歌单制作区 -->
        <main class="panel panel-playlist" id="panelPlaylist">
            <div class="panel-header">
                <h2>🛠️ 我的工作区</h2>
                <div class="playlist-actions">
                    <span class="song-count" id="playlistCount">0 首</span>
                    <span class="song-count" id="playlistTotalDuration" title="总时长">0:00</span>
                    <button class="btn btn-small btn-danger" id="btnClearPlaylist" title="清空歌单">
                        🗑️ 清空
                    </button>
                </div>
            </div>

            <!-- 歌单名称 -->
            <div class="playlist-name-row">
                <input type="text" id="playlistName" placeholder="输入歌单名称..." value="婚礼歌单">
            </div>

            <!-- 音频未加载提示条（file:// 协议等场景） -->
            <div class="audio-banner" id="audioBanner" style="display:none;">
                <span>⚠️ 有 <strong id="audioBannerCount">0</strong> 首歌曲音频未加载</span>
                <button class="btn btn-small btn-primary" id="btnLoadAudio">📥 一键加载音频</button>
            </div>

            <!-- 歌单歌曲列表 -->
            <div class="song-list playlist-list" id="playlistList">
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <p>歌单还是空的</p>
                    <p class="empty-hint">从左侧音乐库点击 <strong>+</strong> 添加歌曲</p>
                </div>
            </div>

            <!-- 歌单操作 -->
            <div class="playlist-footer">
                <button class="btn btn-primary" id="btnSavePlaylist">💾 保存歌单</button>
                <button class="btn btn-outline" id="btnLoadPlaylist">📂 加载歌单</button>
                <button class="btn btn-outline" id="btnExportPlaylist" title="导出歌单信息 JSON">📤 导出信息</button>
                <select id="savedPlaylists" class="saved-select">
                    <option value="">-- 已保存的歌单 --</option>
                </select>
                <button class="btn btn-small btn-danger" id="btnDeleteSaved" title="删除选中的歌单">🗑️</button>
            </div>
        </main>
    </div>

    <!-- 音乐播放器（底部迷你栏） -->
    <div class="mini-player" id="miniPlayer" style="display:none;">
        <div class="player-info">
            <div class="player-cover" id="playerCover">🎵</div>
            <div class="player-meta">
                <span class="player-title" id="playerTitle">-</span>
                <span class="player-artist" id="playerArtist">-</span>
            </div>
        </div>
        <div class="player-controls">
            <button class="btn-icon" id="btnPrev" title="上一首">⏮️</button>
            <button class="btn-icon btn-play" id="btnPlay" title="播放/暂停">▶️</button>
            <button class="btn-icon" id="btnNext" title="下一首">⏭️</button>
        </div>
        <div class="player-progress">
            <input type="range" id="progressBar" min="0" max="100" value="0">
            <span class="player-time" id="playerTime">0:00 / 0:00</span>
        </div>
        <div class="player-volume">
            <span>🔊</span>
            <input type="range" id="volumeBar" min="0" max="100" value="70">
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <!-- 音频剪辑器模态框 -->
    <div class="modal-overlay" id="editorOverlay" style="display:none;">
        <div class="modal editor-modal" id="audioEditorModal" style="display:none;">
            <button class="modal-close" id="editorClose">✕</button>
            <div class="editor-header">
                <h2>✂️ 音频剪辑器</h2>
                <span class="editor-subtitle" id="editorOriginalName">-</span>
            </div>
            <div class="editor-body">
                <div class="editor-row">
                    <label>剪辑名称：</label>
                    <input type="text" id="editorNewName" placeholder="输入剪辑后的名称...">
                </div>
                <div class="editor-row">
                    <label>原始时长：</label>
                    <span id="editorDuration">--:--</span>
                </div>

                <!-- 波形图画布 -->
                <div class="waveform-container">
                    <canvas id="editorCanvas"></canvas>
                </div>

                <!-- 时间控制 -->
                <div class="editor-time-controls">
                    <div class="time-input-group">
                        <label>开始时间</label>
                        <input type="text" id="editorTrimStart" value="0:00">
                    </div>
                    <div class="time-input-group">
                        <label>结束时间</label>
                        <input type="text" id="editorTrimEnd" value="0:00">
                    </div>
                    <div class="time-input-group">
                        <label>剪辑时长</label>
                        <span id="editorClipDuration">0:00</span>
                    </div>
                    <button class="btn btn-small btn-outline" id="btnEditorApplyTime">应用</button>
                </div>

                <!-- 操作按钮 -->
                <div class="editor-actions">
                    <button class="btn btn-outline" id="btnEditorPlay">▶ 预览剪辑</button>
                    <button class="btn btn-primary" id="btnEditorSave">💾 保存到音乐库</button>
                </div>
            </div>
        </div>
    </div>
    </div><!-- /appMain -->

    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>

    <!-- 预设音乐库数据（内嵌，无需服务器） -->

</body>
</html>
